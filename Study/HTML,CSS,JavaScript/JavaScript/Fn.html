<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function adderN(x,y) { // 함수 정의 { 안에 있는 내용이 실행문 } 
            var num1 = x; // num1 변수 지정 - x를 넣음 (var이 변수 선언 예약어)
            var num2 = y; // num2 변수 지정 - y를 넣음
            var sum = num1 + num2; // sum 변수 지정 - num1과 num2를 더한 값을 넣음
            alert("결과 값 " + sum); // alert 문으로 출력
        } // 함수 정의의 끝

        while(1) {
            var a = parseInt(prompt("함수를 입력하세요"));
            var b = parseInt(prompt("함수를 입력하세요"));
            adderN(a, b); // 함수 호출 - adderN이라는 함수를 호출하는데, x에 3과 y에 2를 넣음

            if (a == 0 || b == 0) { // a나 b가 0이면
         // if (a == 0 || b == 0) break; 로도 가능 ( { 안에 있는 내용이 실행문 } 이 하나이므로 )
                alert("프로그램 종료");
                break; // while문 탈출
            }
        }

        // for 문으로 무한 루프 하는법

        // for(;;) {
            // var a = parseInt(prompt("함수를 입력하세요"));
            // var b = parseInt(prompt("함수를 입력하세요"));
            // adderN(a, b); // 함수 호출 - adderN이라는 함수를 호출하는데, x에 3과 y에 2를 넣음
        // }
    </script>
</body>
</html>
