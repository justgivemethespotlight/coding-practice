<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function calcSum(n) {
            sum = 0;
            for(let i = 1; i < n + 1; i++) {
                sum += i;
           }
        }
        calcSum(10);
        console.log(sum); // sum이 함수 안에서 let으로 선언되지 않았기 때문에, 전역 변수로 지정되어서 함수 밖에서도 sum을 사용할 수 있음
    </script>
</body>
</html>
