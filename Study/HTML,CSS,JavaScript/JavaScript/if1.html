<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var userNumber = prompt("숫자를 입력하세요:");

        if (userNumber % 3 === 0) {
            alert("입력한 숫자는 양수입니다.");
        } else if (userNumber < 0) {
            alert("입력한 숫자는 음수입니다.");
        } else {
            alert("입력한 숫자는 0입니다.");
        } 
    </script>
</body>
</html>
