<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 이벤트</title>
    <link rel="stylesheet" href="Function.css">
</head>
<body>
    <ul>
        <li> <a href="#" class="color-link" data-color="green">Green</a> </li>
        <li> <a href="#" class="color-link" data-color="orange">Orange</a> </li>
        <li> <a href="#" class="color-link" data-color="purple">Purple</a> </li>
    </ul>
    <div id="result"></div>

    <script>
        function changeBg(color) {
            var result = document.querySelector("#result");
            result.style.backgroundColor = color;
        }

        document.querySelectorAll('.color-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                var color = this.getAttribute('data-color');
                changeBg(color);
            });
        });
    </script>
</body>
</html>
