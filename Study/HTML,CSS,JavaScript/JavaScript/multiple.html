<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            padding-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>
        function multiple(a, b = 5, c = 10) { // b = 5, c = 10은 기본값 지정
            return a * b + c; // a와 b를 곱한 후 c를 더하는 계산을 수행
        }
        var result1 = multiple(5, 10, 20); // a = 5, b = 10, c = 20
        document.write("multiple(5, 10, 20)을 실행하면 결과는 " + result1 + " 입니다 <br>"); // 출력문 (document.write)
        var result2 = multiple(10, 20); // a = 10, b = 20, c는 기본값 10
        document.write("multiple(10, 20)을 실행하면 세번째 매개변수는 기본값을 사용하고 결과는 " + result2 + " 입니다 <br>");
        var result3 = multiple(30); // a = 30, b는 기본값 5, c는 기본값 10
        document.write("multiple(30)을 실행하면 두번째, 세번째 매개변수는 기본값을 사용하고 결과는 " + result3 + " 입니다 <br>");
    </script>
</body>
</html>
