<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form예제</title>
    <link rel="stylesheet" href="form-css.css"> <!-- CSS와 연결-->
</head>
<body>
    <form id="signup">
        <fieldset>
            <legend>로그인 정보</legend>
                <ul>
                    <li>
                        <label for="userid">아이디:</label>
                        <input type="text" id="userid" name="id" alt="아이디"><br><br>
                    </li>
                    <li>
                        <label for="userid-check">아이디 체크:</label>
                        <input type="text" id="userid-check" name="id"><br><br>
                    </li>
                    <li>
                        <label for="pwd1" id="pwd1-label">비밀번호:</label>
                        <input type="password" id="pwd1" name="password"><br><br>
                    </li>
                    <li>
                        <label for="pwd2" id="pwd2-label">비밀번호 확인:</label>
                        <input type="password" id="pwd2" name="password-repeat"><br><br>
                    </li>
                    <li>
                        <label for="level" id="level-label">회원등급:</label>
                        <input type="text" id="level" name="membership-level" readonly value="준회원">
                    </li>
                </ul>
        </fieldset>
        <fieldset>
            <legend>개인 정보</legend>
                <ul>
                    <li>
                        <label for="fullname">이름:</label>
                        <input type="text" id="fullname" name="name"><br><br>
                    </li>
                    <li>
                        <label for="email">메일 주소:</label>
                        <input type="email" id="email" name="email"><br><br>
                    </li>
                    <li>
                        <label for="tel">연락처:</label>
                        <input type="tel" id="tel" name="tel"><br><br>
                    </li>
                </ul>
        </fieldset>
        <fieldset>
            <input type="submit" value="제출">
        </fieldset>
    </form>
</body>
</html>
