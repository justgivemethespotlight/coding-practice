<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 페이지에 가격 떠오르게 만들기</title>
</head>
    <body>
        <style>
            #container {
                width: 1000px; margin:20px auto; 
            }
            h1 {
                text-align: center;
            }
            .prod-list {
                list-style: none;
                margin: 0;
                padding: 0;
            }
            .prod-list li {
                position: relative;
                float: left;
                padding: 0;
                margin: 10px;
                overflow: hidden;
            }
            .prod-list img {
                margin: 0;
                padding: 0;
                float: left;
                z-index: 5;
            }
            .prod-list .caption {
                position: absolute;
                top: 200px;
                width: 300px;
                height: 200px;
                padding-top: 20px;
                background:rgba(0,0,0,0.6);
                opacity: 0;
                -moz-transition: all 0.2s ease-in-out;
                -o-transition: all 0.2s ease-in-out;
                -webkit-transition: all 0.2s ease-in-out;
                transition: all 0.2s ease-in-out;
                z-index: 10;
            }
            .prod-list li:hover .caption {
                opacity: 1;
                -moz-transform: translateY(-200px);                
                -ms-transform: translateY(-200px);
                -o-transform: translateY(-200px);
                -webkit-transform: translateY(-200px);
            }
            .prod-list .caption h2, .prod-list .caption p {
                color: #fff;
                text-align: center;
            }

        </style>
    </head>
</body>
    <h1>BMW 코리아</h1>
        <div id="container">
            <ul class="prod-list">
                <li>
                    <img src="image/BMW_M5_F90_LC.webp" width="300px" height="200px">
                    <div class="caption">
                        <h2>BMW M5 LCI</h2>
                        <p>625hp에 4.4L V8 twin-turbo의 강력함을 숨긴 M5. 다시 LCI로 찾아오다.</p>
                        <p>148,500,000원부터 시작</p>
                    </div>
                </li>
                <li>
                    <img src="image/M4_gt3.jpg" width="300px" height="200px">
                    <div class="caption">
                        <h2>BMW M4 GT3</h2>
                        <p>590hp에 3.0L L6 twin-turbo의 순수 혈통 M4 GT3. 트랙 위에서 증명되다.</p>
                        <p>860,000,000원부터 시작.</p>
                </li>
                <li>
                    <img src="image/M3.jpeg" width="300px" height="200px">
                    <div class="caption">
                        <h2>BMW M3</h2>
                        <p>530hp에 3.0L L6 twin-turbo의 전천후 M3. 일상을 트랙으로 뒤바꾸다.</p>
                        <p>136,600,000원부터 시작.</p>
                    </div>
                </li>
            </ul>
        </div>
    </body>
</html>
