<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>친구 관계 표</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;padding:1.5rem;background:#fff;color:#111}
.wrap{max-width:960px;margin:0 auto}
.grade-tabs{display:flex;gap:6px;margin-bottom:1rem}
.gtab{padding:6px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.gtab.on{background:#111;color:#fff;border-color:#111}
.gtab:hover:not(.on){background:#f5f5f5}
.class-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem}
.ctab{padding:4px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-size:12px;transition:all .15s}
.ctab.on{background:#f0f0f0;color:#111;border-color:#bbb;font-weight:500}
.ctab:hover:not(.on){background:#f5f5f5}
.dept{font-size:11px;color:#aaa;margin-bottom:.75rem}
.legend{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;padding:8px 12px;background:#f8f8f8;border-radius:8px;border:1px solid #eee}
.legend-title{font-size:11px;color:#666;margin-right:4px}
.lchip{font-size:11px;padding:2px 9px;border-radius:99px}
.l0{background:#F1EFE8;color:#5F5E5A;border:1px solid #D3D1C7}
.l1{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4}
.l2{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97}
.l3{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775}
.l4{background:#EEEDFE;color:#534AB7;border:1px solid #CECBF6}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px}
.card{background:#fff;border:1px solid #eee;border-radius:8px;padding:9px 11px;transition:border-color .15s}
.card:hover{border-color:#ccc}
.num{font-size:11px;color:#aaa;margin-bottom:2px}
.name{font-size:14px;font-weight:500;color:#111;margin-bottom:7px}
.sel-wrap{position:relative}
.sel{width:100%;padding:3px 7px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#111;cursor:pointer;font-family:'Pretendard',sans-serif;appearance:none;-webkit-appearance:none}
.sel:focus{outline:none}
.sel-wrap::after{content:"▾";position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;color:#aaa;pointer-events:none}
.stats-box{margin-top:1.25rem;background:#f8f8f8;border-radius:8px;border:1px solid #eee;padding:14px 16px}
.stats-title{font-size:12px;font-weight:600;color:#555;margin-bottom:10px}
.stats-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.summary-item{background:#fff;border-radius:8px;padding:8px 14px;text-align:center;border:1px solid #eee}
.summary-n{font-size:20px;font-weight:600;color:#111}
.summary-l{font-size:11px;color:#888;margin-top:1px}
.bar-list{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{width:70px;font-size:12px;color:#666;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:14px;background:#fff;border-radius:99px;overflow:hidden;border:1px solid #eee}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.bar-cnt{width:32px;font-size:12px;color:#555;text-align:left;flex-shrink:0}
.bar-pct{width:36px;font-size:11px;color:#aaa;text-align:right;flex-shrink:0}
.bf0{background:#C8C5BB}
.bf1{background:#7EB6E8}
.bf2{background:#94D068}
.bf3{background:#F5B14A}
.bf4{background:#9B95E8}

.divider{border:none;border-top:1px solid #eee;margin:1.5rem 0}
.empty-box{padding:2rem;text-align:center;color:#bbb;font-size:13px;background:#f8f8f8;border-radius:8px;border:1px dashed #ddd}
.saved{font-size:11px;color:#aaa;margin-top:.5rem;height:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="grade-tabs" id="grade-tabs"></div>
  <div id="main-content"></div>
</div>

<script>
const GRADES = [
  { label: '1학년', classes: [
    {n:'1반',d:'소프트웨어과',s:[['1101','강태우'],['1102','김민성'],['1103','김수빈'],['1104','김지우'],['1105','문희서'],['1106','박상현'],['1107','박서아'],['1108','박소연'],['1109','박진우'],['1110','성용석'],['1111','오재인'],['1112','우하경'],['1113','윤치오'],['1114','이서윤'],['1115','이시윤'],['1116','장예나'],['1117','장우진'],['1118','조동규']]},
    {n:'2반',d:'소프트웨어과',s:[['1201','고성민'],['1202','고희경'],['1204','김규리'],['1205','김선민'],['1206','박지성'],['1207','변지현'],['1208','여서정'],['1209','유리한'],['1210','윤규태'],['1211','이윤재'],['1212','이현민'],['1213','전효민'],['1214','조예지'],['1215','최승우'],['1216','최영민'],['1217','한병민'],['1218','황수미']]},
    {n:'3반',d:'소프트웨어과',s:[['1301','강승주'],['1302','강진후'],['1303','김동하'],['1304','김래원'],['1305','김민준'],['1306','김서은'],['1307','김예령'],['1308','김윤수'],['1309','손예준'],['1310','은지호'],['1311','이사랑'],['1312','이수정'],['1313','장윤호'],['1314','조승원'],['1315','최우진'],['1316','한민서'],['1317','함서희'],['1318','황지온']]},
    {n:'4반',d:'소프트웨어과',s:[['1401','권도현'],['1402','김다솔'],['1403','김동우'],['1404','김원준'],['1405','박경은'],['1406','박윤우'],['1407','백수민'],['1408','송동욱'],['1409','신선혜'],['1410','안지민'],['1411','유승연'],['1412','유지원'],['1413','이가흔'],['1414','이다경'],['1415','이은율'],['1416','장정원'],['1417','주승빈'],['1418','지예은']]},
    {n:'5반',d:'디자인과',s:[['1501','공지우'],['1502','구하민'],['1503','김가현'],['1504','김다은'],['1505','김은율'],['1506','문지원'],['1507','박승하'],['1508','백지현'],['1509','백하은'],['1510','심지윤'],['1511','유형석'],['1512','윤하은'],['1513','이주화'],['1514','이효주'],['1515','조나현'],['1516','한가은'],['1517','한서연'],['1518','황서현']]},
    {n:'6반',d:'디자인과',s:[['1601','고대현'],['1602','권현주'],['1603','김민경'],['1604','김원균'],['1605','문지윤'],['1606','박소이'],['1607','박지수'],['1608','심윤진'],['1609','유석현'],['1610','유성아'],['1611','유의인'],['1612','이보배'],['1613','이서연'],['1614','이서율'],['1615','이소정'],['1616','이인서'],['1617','천효주'],['1618','최강은']]}
  ]},
  { label: '2학년', classes: [] },
  { label: '3학년', classes: [] }
];

const LV = [
  {t:'모름',     cls:'l0', bcls:'bf0'},
  {t:'나만 앎',  cls:'l1', bcls:'bf1'},
  {t:'아는 사이',cls:'l2', bcls:'bf2'},
  {t:'친함',     cls:'l3', bcls:'bf3'},
  {t:'절친',     cls:'l4', bcls:'bf4'}
];

let rel = {}, curGrade = 0, curClass = 0;

// localStorage 사용 (브라우저에서 열 때 저장 유지)
function loadData() {
  try { const r = localStorage.getItem('friends_v3'); if (r) rel = JSON.parse(r); } catch(e) { rel = {}; }
  renderAll();
}

function saveRel(id, v) {
  rel[id] = v;
  try { localStorage.setItem('friends_v3', JSON.stringify(rel)); } catch(e) {}
  const el = document.getElementById('saved');
  if (el) { el.textContent = '✓ 저장됨'; setTimeout(() => { if(el) el.textContent = ''; }, 1200); }
  renderStats();
}

function computeStats(students) {
  const cnt = Array(5).fill(0);
  students.forEach(([id]) => cnt[rel[id] ?? 0]++);
  return cnt;
}

function renderGradeTabs() {
  document.getElementById('grade-tabs').innerHTML = GRADES.map((g, i) =>
    `<button class="gtab${i === curGrade ? ' on' : ''}" onclick="switchGrade(${i})">${g.label}</button>`
  ).join('');
}

function switchGrade(i) { curGrade = i; curClass = 0; renderAll(); }
function switchClass(i) { curClass = i; renderContent(); renderStats(); }

function renderAll() { renderGradeTabs(); renderContent(); }

function renderContent() {
  const g = GRADES[curGrade];
  const content = document.getElementById('main-content');

  if (g.classes.length === 0) {
    content.innerHTML = `<div class="empty-box">아직 등록된 학생이 없어요</div>`;
    return;
  }

  const classTabs = [...g.classes.map(c => c.n), '전체'];
  const classTabsHTML = classTabs.map((n, i) =>
    `<button class="ctab${i === curClass ? ' on' : ''}" onclick="switchClass(${i})">${n}</button>`
  ).join('');

  const isAll = (curClass === g.classes.length);
  const students = isAll ? g.classes.flatMap(c => c.s) : (g.classes[curClass]?.s || []);
  const dept = isAll ? `${g.label} 전체 ${students.length}명` : `${g.classes[curClass].d} · ${students.length}명`;

  const gridHTML = students.map(([id, name]) => {
    const v = rel[id] ?? 0;
    const opts = LV.map((l, i) => `<option value="${i}"${i === v ? ' selected' : ''}>${l.t}</option>`).join('');
    return `<div class="card">
      <div class="num">${id}</div>
      <div class="name">${name}</div>
      <div class="sel-wrap">
        <select class="sel ${LV[v].cls}" onchange="onSel('${id}',this)">${opts}</select>
      </div>
    </div>`;
  }).join('');

  content.innerHTML = `
    <div class="legend">
      <span class="legend-title">단계 →</span>
      ${LV.map(l => `<span class="lchip ${l.cls}">${l.t}</span>`).join('')}
    </div>
    <div class="class-tabs">${classTabsHTML}</div>
    <div class="dept">${dept}</div>
    <div class="grid">${gridHTML}</div>
    <div id="stats-area"></div>
    <div class="saved" id="saved"></div>
  `;
  renderStats();
}

function renderStats() {
  const g = GRADES[curGrade];
  if (g.classes.length === 0) return;

  const isAll = (curClass === g.classes.length);
  const allStudents = g.classes.flatMap(c => c.s);
  const curStudents = isAll ? allStudents : (g.classes[curClass]?.s || []);

  const cnt = computeStats(curStudents);
  const total = curStudents.length;
  const known = cnt[1] + cnt[2] + cnt[3] + cnt[4];
  const close = cnt[3] + cnt[4];
  const best = cnt[4];

  function summaryHTML(cnt, total) {
    const known = cnt[1]+cnt[2]+cnt[3]+cnt[4];
    return `
      <div class="stats-summary">
        <div class="summary-item"><div class="summary-n">${total}</div><div class="summary-l">전체</div></div>
        <div class="summary-item"><div class="summary-n">${known}</div><div class="summary-l">아는 학생</div></div>
        <div class="summary-item"><div class="summary-n">${cnt[3]+cnt[4]}</div><div class="summary-l">친한 학생</div></div>
        <div class="summary-item"><div class="summary-n">${cnt[4]}</div><div class="summary-l">절친</div></div>
      </div>`;
  }

  function barHTML(cnt, total) {
    return cnt.map((n, i) => {
      const pct = total > 0 ? Math.round(n / total * 100) : 0;
      return `<div class="bar-row">
        <span class="bar-label">${LV[i].t}</span>
        <div class="bar-track"><div class="bar-fill ${LV[i].bcls}" style="width:${pct}%"></div></div>
        <span class="bar-cnt">${n}명</span>
        <span class="bar-pct">${pct}%</span>
      </div>`;
    }).join('');
  }

  const allCnt = computeStats(allStudents);
  const allTotal = allStudents.length;

  let gradeAllHTML = '';
  if (!isAll) {
    gradeAllHTML = `
      <hr class="divider">
      <div class="stats-box">
        <div class="stats-title">${g.label} 전체 현황 (${allTotal}명)</div>
        ${summaryHTML(allCnt, allTotal)}
        <div class="bar-list">${barHTML(allCnt, allTotal)}</div>
      </div>`;
  }

  const area = document.getElementById('stats-area');
  if (area) area.innerHTML = `
    <div class="stats-box">
      <div class="stats-title">${isAll ? g.label + ' 전체' : g.classes[curClass].n} 통계</div>
      ${summaryHTML(cnt, total)}
      <div class="bar-list">${barHTML(cnt, total)}</div>
    </div>
    ${gradeAllHTML}
  `;
}

function onSel(id, el) {
  const v = parseInt(el.value);
  el.className = 'sel ' + LV[v].cls;
  saveRel(id, v);
}

loadData();
</script>
</body>
</html>
