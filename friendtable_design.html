<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>친구 관계 표</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root {
  --bg:       #F2F2F2;
  --surface:  #FFFFFF;
  --tab-bg:   #FFFFFF;
  --border:   #E0E0E0;
  --border2:  #EBEBEB;
  --text:     #111111;
  --text2:    #555555;
  --text3:    #999999;
  --code-bg:  #F7F7F7;
  --code-border: #E0E0E0;
  --btn-bg:   #EFEFEF;
  --btn-hover:#E4E4E4;
  --toggle-track: #DDDDDD;
  --stats-bg: #F7F7F7;
}
[data-theme="dark"] {
  --bg:       #000000;
  --surface:  #111111;
  --tab-bg:   #1A1A1A;
  --border:   #2A2A2A;
  --border2:  #222222;
  --text:     #EEEEEE;
  --text2:    #AAAAAA;
  --text3:    #666666;
  --code-bg:  #0A0A0A;
  --code-border: #2A2A2A;
  --btn-bg:   #1E1E1E;
  --btn-hover:#2A2A2A;
  --toggle-track: #333333;
  --stats-bg: #0D0D0D;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .2s, color .2s;
}

/* 상단 헤더 */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title { font-size: 14px; font-weight: 600; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 10px; }

/* 소스코드 토글 버튼 */
.code-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--btn-bg);
  color: var(--text2);
  font-family: 'Pretendard', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: background .15s;
}
.code-btn:hover { background: var(--btn-hover); }
.code-btn.on { background: var(--text); color: var(--bg); border-color: var(--text); }

/* 다크모드 토글 */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  user-select: none;
}
.toggle-track {
  width: 36px; height: 20px;
  border-radius: 99px;
  background: var(--toggle-track);
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
[data-theme="dark"] .toggle-track { background: #fff; }
.toggle-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 3px; left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
[data-theme="dark"] .toggle-thumb { transform: translateX(16px); background: #000; }

/* 레이아웃 */
.layout { display: flex; min-height: calc(100vh - 53px); }
.app-panel { flex: 1; padding: 1.25rem 1.5rem; min-width: 0; }
.code-panel {
  width: 420px;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--code-bg);
  display: none;
  flex-direction: column;
}
.code-panel.open { display: flex; }
.code-panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--code-border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.copy-btn {
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--btn-bg);
  color: var(--text3);
  font-size: 11px;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
}
.copy-btn:hover { background: var(--btn-hover); color: var(--text2); }
pre {
  flex: 1;
  overflow: auto;
  padding: 14px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--text2);
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: pre;
}

/* 학년 탭 */
.grade-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
.gtab {
  padding: 6px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--tab-bg);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Pretendard', sans-serif;
  transition: all .15s;
}
.gtab.on { background: var(--text); color: var(--bg); border-color: var(--text); }
.gtab:hover:not(.on) { background: var(--btn-hover); }

/* 반 탭 */
.class-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: .75rem; }
.ctab {
  padding: 4px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--tab-bg);
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Pretendard', sans-serif;
  transition: all .15s;
}
.ctab.on { background: var(--surface); color: var(--text); border-color: var(--border); font-weight: 500; }
.ctab:hover:not(.on) { background: var(--btn-hover); }

.dept { font-size: 11px; color: var(--text3); margin-bottom: .75rem; }

/* 범례 */
.legend {
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
  margin-bottom: 1rem; padding: 8px 12px;
  background: var(--surface);
  border-radius: 8px; border: 1px solid var(--border);
}
.legend-title { font-size: 11px; color: var(--text2); margin-right: 4px; }
.lchip { font-size: 11px; padding: 2px 9px; border-radius: 99px; }
.l0 { background:#F1EFE8; color:#5F5E5A; border:1px solid #D3D1C7; }
.l1 { background:#E6F1FB; color:#185FA5; border:1px solid #B5D4F4; }
.l2 { background:#EAF3DE; color:#3B6D11; border:1px solid #C0DD97; }
.l3 { background:#FAEEDA; color:#854F0B; border:1px solid #FAC775; }
.l4 { background:#FDEDED; color:#A12B2B; border:1px solid #F7C6C6; }
.l5 { background:#EEEDFE; color:#534AB7; border:1px solid #CECBF6; }

/* 카드 그리드 */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 7px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px; padding: 9px 11px;
  transition: border-color .15s;
}
.card:hover { border-color: var(--border); }
.num { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 7px; }
.sel-wrap { position: relative; }
.sel {
  width: 100%; padding: 3px 7px;
  border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  appearance: none; -webkit-appearance: none;
}
.sel:focus { outline: none; }
.sel-wrap::after {
  content: "▾"; position: absolute;
  right: 7px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--text3); pointer-events: none;
}

/* 통계 */
.stats-box {
  margin-top: 1.25rem;
  background: var(--stats-bg);
  border-radius: 8px; border: 1px solid var(--border);
  padding: 14px 16px;
}
.stats-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
.stats-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.summary-item {
  background: var(--surface);
  border-radius: 8px; padding: 8px 14px;
  text-align: center; border: 1px solid var(--border);
}
.summary-n { font-size: 20px; font-weight: 600; color: var(--text); }
.summary-l { font-size: 11px; color: var(--text2); margin-top: 1px; }
.bar-list { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 70px; font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; }
.bar-track {
  flex: 1; height: 14px;
  background: var(--surface);
  border-radius: 99px; overflow: hidden;
  border: 1px solid var(--border);
}
.bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.bar-cnt { width: 32px; font-size: 12px; color: var(--text2); text-align: left; flex-shrink: 0; }
.bar-pct { width: 36px; font-size: 11px; color: var(--text3); text-align: right; flex-shrink: 0; }
.bf0{background:#C8C5BB} .bf1{background:#7EB6E8}
.bf2{background:#94D068} .bf3{background:#F5B14A} .bf4{background:#9B95E8} .bf5{background:#F28B8B}

.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.empty-box {
  padding: 2rem; text-align: center; color: var(--text3);
  font-size: 13px; background: var(--surface);
  border-radius: 8px; border: 1px dashed var(--border);
}
.saved { font-size: 11px; color: var(--text3); margin-top: .5rem; height: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">친구 관계 표</span>
  <div class="topbar-right">
    <button class="code-btn" id="codeBtn" onclick="toggleCode()">{'</>'} 소스코드</button>
    <label class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-label">라이트</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </div>
</div>

<div class="layout">
  <div class="app-panel">
    <div class="grade-tabs" id="grade-tabs"></div>
    <div id="main-content"></div>
  </div>
  <div class="code-panel" id="code-panel">
    <div class="code-panel-header">
      <span>HTML 소스코드</span>
      <button class="copy-btn" onclick="copyCode()">복사</button>
    </div>
    <pre id="code-view"></pre>
  </div>
</div>

<script>
/* ── 테마 ── */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-label').textContent = isDark ? '라이트' : '다크';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function(){
  const t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-label').textContent = t === 'dark' ? '다크' : '라이트';
})();

/* ── 소스코드 패널 ── */
function toggleCode() {
  const panel = document.getElementById('code-panel');
  const btn   = document.getElementById('codeBtn');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('on', isOpen);
  if (isOpen && !document.getElementById('code-view').textContent) {
    document.getElementById('code-view').textContent = document.documentElement.outerHTML;
  }
}
function copyCode() {
  navigator.clipboard.writeText(document.documentElement.outerHTML).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

/* ── 데이터 ── */
const GRADES = [
  { label: '1학년', classes: [
    {n:'1반',d:'소프트웨어과',s:[['1101','강태우'],['1102','김민성'],['1103','김수빈'],['1104','김지우'],['1105','문희서'],['1106','박상현'],['1107','박서아'],['1108','박소연'],['1109','박진우'],['1110','성용석'],['1111','오재인'],['1112','우하경'],['1113','윤치오'],['1114','이서윤'],['1115','이시윤'],['1116','장예나'],['1117','장우진'],['1118','조동규']]},
    {n:'2반',d:'소프트웨어과',s:[['1201','고성민'],['1202','고희경'],['1204','김규리'],['1205','김선민'],['1206','박지성'],['1207','변지현'],['1208','여서정'],['1209','유리한'],['1210','윤규태'],['1211','이윤재'],['1212','이현민'],['1213','전효민'],['1214','조예지'],['1215','최승우'],['1216','최영민'],['1217','한병민'],['1218','황수미']]},
    {n:'3반',d:'소프트웨어과',s:[['1301','강승주'],['1302','강진후'],['1303','김동하'],['1304','김래원'],['1305','김민준'],['1306','김서은'],['1307','김예령'],['1308','김윤수'],['1309','손예준'],['1310','은지호'],['1311','이사랑'],['1312','이수정'],['1313','장윤호'],['1314','조승원'],['1315','최우진'],['1316','한민서'],['1317','함서희'],['1318','황지온']]},
    {n:'4반',d:'소프트웨어과',s:[['1401','권도현'],['1402','김다솔'],['1403','김동우'],['1404','김원준'],['1405','박경은'],['1406','박윤우'],['1407','백수민'],['1408','송동욱'],['1409','신선혜'],['1410','안지민'],['1411','유승연'],['1412','유지원'],['1413','이가흔'],['1414','이다경'],['1415','이은율'],['1416','장정원'],['1417','주승빈'],['1418','지예은']]},
    {n:'5반',d:'디자인과',s:[['1501','공지우'],['1502','구하민'],['1503','김가현'],['1504','김다은'],['1505','김은율'],['1506','문지원'],['1507','박승하'],['1508','백지현'],['1509','백하은'],['1510','심지윤'],['1511','유형석'],['1512','윤하은'],['1513','이주화'],['1514','이효주'],['1515','조나현'],['1516','한가은'],['1517','한서연'],['1518','황서현']]},
    {n:'6반',d:'디자인과',s:[['1601','고대현'],['1602','권현주'],['1603','김민경'],['1604','김원균'],['1605','문지윤'],['1606','박소이'],['1607','박지수'],['1608','심윤진'],['1609','유석현'],['1610','유성아'],['1611','유의인'],['1612','이보배'],['1613','이서연'],['1614','이서율'],['1615','이소정'],['1616','이인서'],['1617','천효주'],['1618','최강은']]}
  ]},
  { label: '2학년', classes: [] },
  { label: '3학년', classes: [] }
];

const LV = [
  {t:'모름',     cls:'l0', bcls:'bf0'},
  {t:'나만 앎',  cls:'l1', bcls:'bf1'},
  {t:'아는 사이',cls:'l2', bcls:'bf2'},
  {t:'친함',     cls:'l3', bcls:'bf3'},
  {t:'더 친함',     cls:'l4', bcls:'bf4'},
  {t:'절친',     cls:'l5', bcls:'bf5'}
];

let rel = {}, curGrade = 0, curClass = 0;

function loadData() {
  try { const r = localStorage.getItem('friends_v3'); if (r) rel = JSON.parse(r); } catch(e) {}
  renderAll();
}
function saveRel(id, v) {
  rel[id] = v;
  try { localStorage.setItem('friends_v3', JSON.stringify(rel)); } catch(e) {}
  const el = document.getElementById('saved');
  if (el) { el.textContent = '✓ 저장됨'; setTimeout(() => { if(el) el.textContent = ''; }, 1200); }
  renderStats();
}
function computeStats(students) {
  const cnt = Array(6).fill(0);
  students.forEach(([id]) => cnt[rel[id] ?? 0]++);
  return cnt;
}

function renderGradeTabs() {
  document.getElementById('grade-tabs').innerHTML = GRADES.map((g, i) =>
    `<button class="gtab${i===curGrade?' on':''}" onclick="switchGrade(${i})">${g.label}</button>`
  ).join('');
}
function switchGrade(i) { curGrade = i; curClass = 0; renderAll(); }
function switchClass(i) { curClass = i; renderContent(); renderStats(); }
function renderAll() { renderGradeTabs(); renderContent(); }

function renderContent() {
  const g = GRADES[curGrade];
  const content = document.getElementById('main-content');
  if (g.classes.length === 0) {
    content.innerHTML = `<div class="empty-box">아직 등록된 학생이 없어요</div>`;
    return;
  }
  const isAll = curClass === g.classes.length;
  const students = isAll ? g.classes.flatMap(c => c.s) : (g.classes[curClass]?.s || []);
  const dept = isAll ? `${g.label} 전체 ${students.length}명` : `${g.classes[curClass].d} · ${students.length}명`;
  const classTabs = [...g.classes.map(c => c.n), '전체'];

  content.innerHTML = `
    <div class="legend">
      <span class="legend-title">단계 →</span>
      ${LV.map(l => `<span class="lchip ${l.cls}">${l.t}</span>`).join('')}
    </div>
    <div class="class-tabs">
      ${classTabs.map((n,i) => `<button class="ctab${i===curClass?' on':''}" onclick="switchClass(${i})">${n}</button>`).join('')}
    </div>
    <div class="dept">${dept}</div>
    <div class="grid">
      ${students.map(([id, name]) => {
        const v = rel[id] ?? 0;
        const opts = LV.map((l,i) => `<option value="${i}"${i===v?' selected':''}>${l.t}</option>`).join('');
        return `<div class="card">
          <div class="num">${id}</div>
          <div class="name">${name}</div>
          <div class="sel-wrap">
            <select class="sel ${LV[v].cls}" data-id="${id}" onchange="onSel(this)">${opts}</select>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div id="stats-area"></div>
    <div class="saved" id="saved"></div>
  `;
  renderStats();
}

function renderStats() {
  const g = GRADES[curGrade];
  if (g.classes.length === 0) return;
  const isAll = curClass === g.classes.length;
  const allStudents = g.classes.flatMap(c => c.s);
  const curStudents = isAll ? allStudents : (g.classes[curClass]?.s || []);

  function summary(cnt, total) {
    return `<div class="stats-summary">
      <div class="summary-item"><div class="summary-n">${total}</div><div class="summary-l">전체</div></div>
      <div class="summary-item"><div class="summary-n">${cnt[1]+cnt[2]+cnt[3]+cnt[4]+cnt[5]}</div><div class="summary-l">아는 학생</div></div>
      <div class="summary-item"><div class="summary-n">${cnt[3]+cnt[4]+cnt[5]}</div><div class="summary-l">친한 학생</div></div>
      <div class="summary-item"><div class="summary-n">${cnt[5]}</div><div class="summary-l">절친</div></div>
    </div>`;
  }
  function bars(cnt, total) {
    return cnt.map((n,i) => {
      const pct = total > 0 ? Math.round(n/total*100) : 0;
      return `<div class="bar-row">
        <span class="bar-label">${LV[i].t}</span>
        <div class="bar-track"><div class="bar-fill ${LV[i].bcls}" style="width:${pct}%"></div></div>
        <span class="bar-cnt">${n}명</span>
        <span class="bar-pct">${pct}%</span>
      </div>`;
    }).join('');
  }

  const cnt = computeStats(curStudents);
  const allCnt = computeStats(allStudents);

  const gradeAllHTML = !isAll ? `
    <hr class="divider">
    <div class="stats-box">
      <div class="stats-title">${g.label} 전체 현황 (${allStudents.length}명)</div>
      ${summary(allCnt, allStudents.length)}
      <div class="bar-list">${bars(allCnt, allStudents.length)}</div>
    </div>` : '';

  const area = document.getElementById('stats-area');
  if (area) area.innerHTML = `
    <div class="stats-box">
      <div class="stats-title">${isAll ? g.label+' 전체' : g.classes[curClass].n} 통계</div>
      ${summary(cnt, curStudents.length)}
      <div class="bar-list">${bars(cnt, curStudents.length)}</div>
    </div>
    ${gradeAllHTML}
  `;
}

function onSel(el) {
  const id = el.dataset.id;
  const v = parseInt(el.value);
  el.className = 'sel ' + LV[v].cls;
  saveRel(id, v);
}

loadData();
</script>
</body>
</html>
